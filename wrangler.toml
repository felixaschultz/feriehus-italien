# Cloudflare Workers configuration — Casa Santa Libera (Astro SSR + static assets).
#
# Deploy: `npm run build && npx wrangler deploy`
#
# Do NOT set `pages_build_output_dir` here if you use `wrangler deploy`: that key
# marks the project as Cloudflare Pages-only and Wrangler refuses Workers deploy.
#
# If you switch back to Cloudflare Pages (Git UI): remove `main` and `[assets]`,
# restore `pages_build_output_dir = "./dist"`, and use dashboard builds or
# `wrangler pages deploy ./dist`.
#
# Docs: https://developers.cloudflare.com/workers/framework-guides/web-apps/astro/

name = "feriehus-italien"
main = "./dist/_worker.js/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "assets_navigation_has_no_effect"]

[assets]
binding = "ASSETS"
directory = "./dist"
# Every request hits the Astro worker first; it delegates prerendered HTML / files
# to the asset binding. Fixes SSR routes (/studio) being skipped by asset routing.
run_worker_first = true

# ----------------------------------------------------------------------------
# Public variables (override per-env in the dashboard if needed)
# ----------------------------------------------------------------------------
[vars]
PUBLIC_SANITY_PROJECT_ID = "8chs5okk"
PUBLIC_SANITY_DATASET = "production"

# ----------------------------------------------------------------------------
# KV for Astro Sessions (adapter default binding name: SESSION).
# Create once: `npx wrangler kv namespace create SESSION`, paste id below, uncomment.
# ----------------------------------------------------------------------------
# [[kv_namespaces]]
# binding = "SESSION"
# id = "<paste-id-here>"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
