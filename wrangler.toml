# Cloudflare Pages configuration for Casa Santa Libera.
#
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# IMPORTANT — Pages vs Workers:
#   Cloudflare Pages and Workers share the same wrangler.toml schema, but Pages
#   does NOT support [env.X] blocks. Per-environment overrides (Production vs
#   Preview) for variables and bindings must be configured in the Cloudflare
#   dashboard:
#     Project → Settings → Variables and Secrets
#     Project → Settings → Bindings
#
# Anything sensitive (API tokens, write keys, etc.) must be added in the
# dashboard as a "Secret" — never committed here.

name = "casa-santa-libera"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# ----------------------------------------------------------------------------
# Public variables (apply to all environments unless overridden in dashboard)
# ----------------------------------------------------------------------------
[vars]
PUBLIC_SANITY_PROJECT_ID = "8chs5okk"
PUBLIC_SANITY_DATASET = "production"

# ----------------------------------------------------------------------------
# KV namespace for Astro sessions (used by /studio).
# Until you create the namespace, /studio still loads but session-backed
# features are no-ops. To wire it up:
#   1. wrangler kv namespace create SESSION
#   2. paste the returned id below and uncomment
#   3. (or create it in the dashboard: Workers & Pages → KV → Create)
# ----------------------------------------------------------------------------
# [[kv_namespaces]]
# binding = "SESSION"
# id = "<paste-id-here>"
